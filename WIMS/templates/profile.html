<!DOCTYPE html>
<html>
<head>
<title>Профиль</title>
<link rel="stylesheet" href="/static/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/css/app.css">
<script src="/static/js/theme.js"></script>
</head>
<body class="bg-body">
{{template "navbar" .}}

<div class="wrapper w-100 pt-4 pb-5">
<div class="container" style="max-width:560px">

<div class="d-flex align-items-center gap-2 mb-4">
<h4 class="mb-0 fw-semibold">Профиль</h4>
{{if eq .Role "admin"}}<span class="badge text-bg-danger">admin</span>
{{else if eq .Role "manager"}}<span class="badge text-bg-warning">manager</span>
{{else}}<span class="badge text-bg-primary">user</span>{{end}}
</div>

<form method="post" id="profileForm">

<div class="card p-4 mb-3">
<h6 class="fw-semibold mb-3 text-muted">Личные данные</h6>
<div class="mb-2">
<label class="form-label small mb-1">Логин</label>
<input class="form-control" value="{{.User.Username}}" disabled>
</div>
<div class="row g-2 mb-2">
<div class="col-md-6">
<label class="form-label small mb-1">Имя</label>
<input class="form-control" name="first_name" value="{{.User.FirstName}}" placeholder="Иван">
</div>
<div class="col-md-6">
<label class="form-label small mb-1">Фамилия</label>
<input class="form-control" name="last_name" value="{{.User.LastName}}" placeholder="Иванов">
</div>
</div>
<div class="mb-2">
<label class="form-label small mb-1">Отчество</label>
<input class="form-control" name="middle_name" value="{{.User.MiddleName}}" placeholder="Иванович">
</div>
<div class="mb-2">
<label class="form-label small mb-1">Должность</label>
<input class="form-control" name="position" value="{{.User.Position}}" placeholder="Менеджер">
</div>
<div class="mb-0">
<label class="form-label small mb-1">Email</label>
<input class="form-control" name="email" value="{{.User.Email}}" placeholder="ivan@example.com">
</div>
</div>

<div class="card p-4 mb-3">
<h6 class="fw-semibold mb-3 text-muted">Смена пароля</h6>
<div class="mb-2">
<label class="form-label small mb-1">Текущий пароль</label>
<div class="input-group">
<input id="oldPass" class="form-control" type="password" name="old_password" placeholder="••••••">
<button class="btn btn-outline-secondary" type="button" onclick="togglePass('oldPass',this)">👁</button>
</div>
</div>
<div class="mb-2">
<label class="form-label small mb-1">Новый пароль</label>
<div class="input-group">
<input id="pass1" class="form-control {{if .PasswordError}}is-invalid{{end}}" type="password" name="password1" placeholder="••••••">
<button class="btn btn-outline-secondary" type="button" onclick="togglePass('pass1',this)">👁</button>
</div>
</div>
<div class="mb-0">
<label class="form-label small mb-1">Повторите пароль</label>
<div class="input-group">
<input id="pass2" class="form-control {{if .PasswordError}}is-invalid{{end}}" type="password" name="password2" placeholder="••••••">
<button class="btn btn-outline-secondary" type="button" onclick="togglePass('pass2',this)">👁</button>
</div>
</div>
</div>

<button class="btn btn-primary w-100" type="submit">Сохранить изменения</button>
</form>

</div>
</div>

<!-- МОДАЛКА НЕСОХРАНЁННЫХ ИЗМЕНЕНИЙ -->
<div class="modal fade" id="unsavedModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
<div class="modal-dialog modal-dialog-centered modal-sm">
<div class="modal-content">
<div class="modal-body pt-4">
<p class="mb-3">Вы изменили данные, но не сохранили. Уйти?</p>
<div class="d-flex gap-2">
<button type="button" class="btn btn-secondary flex-fill" id="unsavedStayBtn">Остаться</button>
<button type="button" class="btn btn-danger flex-fill" id="unsavedLeaveBtn">Уйти</button>
</div>
</div>
</div>
</div>
</div>

{{if .Error}}<div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="errorToast" class="toast text-bg-danger"><div class="toast-body">{{.Error}}</div></div></div>{{end}}
{{if .Success}}<div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="successToast" class="toast text-bg-success"><div class="toast-body">{{.Success}}</div></div></div>{{end}}

<script src="/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/logout.js"></script>
<script>
function togglePass(id, btn) {
    var inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.innerText = inp.type === 'password' ? '👁' : '🙈';
}

(function () {
    var dirty = false, pending = null;
    var modal = new bootstrap.Modal(document.getElementById('unsavedModal'));
    document.getElementById('profileForm').addEventListener('input', function() { dirty = true; });
    document.getElementById('profileForm').addEventListener('submit', function() { dirty = false; });
    document.getElementById('unsavedStayBtn').addEventListener('click', function() { pending = null; modal.hide(); });
    document.getElementById('unsavedLeaveBtn').addEventListener('click', function() {
        document.getElementById('unsavedModal').addEventListener('hidden.bs.modal', function() {
            window.location.href = pending;
        }, { once: true });
        modal.hide();
    });
    document.querySelectorAll('a[href]').forEach(function(link) {
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('javascript')) return;
        link.addEventListener('click', function(e) {
            if (!dirty) return;
            e.preventDefault(); e.stopImmediatePropagation();
            pending = href; modal.show();
        }, true);
    });
    var err = document.getElementById('errorToast');
    var ok  = document.getElementById('successToast');
    if (err) new bootstrap.Toast(err).show();
    if (ok)  new bootstrap.Toast(ok).show();
}());
</script>
</body>
</html>
