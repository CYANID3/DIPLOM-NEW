<!DOCTYPE html>
<html>
<head>
<title>Профиль</title>

<link rel="stylesheet" href="/static/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/css/app.css">
<script src="/static/js/theme.js"></script>

</head>

<body class="bg-body">

<nav class="navbar navbar-expand-lg border-bottom px-3">
<div class="container-fluid">

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<div class="navbar-nav">
<a class="nav-link" href="/">Главная</a>
<a class="nav-link" href="/history">История</a>
<a class="nav-link" href="/profile">Профиль</a>

{{if eq .Role "admin"}}
<a class="nav-link nav-admin" href="/admin">Админ-панель</a>
{{end}}
</div>

<div class="ms-auto d-flex gap-2">
<button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()">🌙</button>

<div class="dropdown">
<button class="btn btn-sm btn-success dropdown-toggle" data-bs-toggle="dropdown">
{{.Username}}
</button>

<ul class="dropdown-menu dropdown-menu-end">
<li><a class="dropdown-item" href="/profile">Профиль</a></li>
<li><a class="dropdown-item text-danger" href="/logout">Выход</a></li>
</ul>
</div>

</div>
</div>
</div>
</nav>
<div class="wrapper w-100 pt-4">
<div class="container">

<div class="card p-4">

<h3>Профиль</h3>

<form method="post">

<h5>Данные</h5>

<input class="form-control mb-2" name="first_name" value="{{.User.FirstName}}" placeholder="Имя">
<input class="form-control mb-2" name="last_name" value="{{.User.LastName}}" placeholder="Фамилия">
<input class="form-control mb-2" name="middle_name" value="{{.User.MiddleName}}" placeholder="Отчество">
<input class="form-control mb-2" name="position" value="{{.User.Position}}" placeholder="Должность">
<input class="form-control mb-3" name="email" value="{{.User.Email}}" placeholder="Email">

<h5>Смена пароля</h5>

<div class="input-group mb-2">
<input id="oldPass" class="form-control" type="password" name="old_password" placeholder="Текущий пароль">
<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('oldPass', this)">👁</button>
</div>

<div class="input-group mb-2">
<input id="pass1"
       class="form-control {{if .Error}}is-invalid{{end}}"
       type="password"
       name="password1"
       placeholder="Новый пароль">
<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('pass1', this)">👁</button>
</div>

<div class="input-group mb-3">
<input id="pass2"
       class="form-control {{if .Error}}is-invalid{{end}}"
       type="password"
       name="password2"
       placeholder="Повторите пароль">
<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('pass2', this)">👁</button>
</div>

<button class="btn btn-primary w-100">Сохранить</button>

</form>

</div>

</div>
</div>
<!-- TOAST -->
{{if .Error}}
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="errorToast" class="toast text-bg-danger">
    <div class="toast-body">{{.Error}}</div>
  </div>
</div>
{{end}}

{{if .Success}}
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="successToast" class="toast text-bg-success">
    <div class="toast-body">{{.Success}}</div>
  </div>
</div>
{{end}}

<script src="/static/js/bootstrap.bundle.min.js"></script>

<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        btn.innerText = "🙈";
    } else {
        input.type = "password";
        btn.innerText = "👁";
    }
}

document.addEventListener("DOMContentLoaded", function () {
    const err = document.getElementById("errorToast");
    const ok = document.getElementById("successToast");

    if (err) new bootstrap.Toast(err).show();
    if (ok) new bootstrap.Toast(ok).show();
});
</script>

</body>
</html>
