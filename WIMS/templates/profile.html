<!DOCTYPE html>
<html>
<head>
<title>Профиль</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

<h5>Вы: {{.Username}}</h5>

<div class="mb-3">
<a class="btn btn-outline-primary btn-sm" href="/">Главная</a>
<a class="btn btn-outline-primary btn-sm" href="/history">История</a>
<a class="btn btn-outline-danger btn-sm" href="/logout">Выход</a>
</div>

<div class="card p-3">
<h4>Профиль</h4>

<p><b>Логин:</b> {{.User.Username}}</p>

<form method="post">
<input class="form-control mb-2" name="first_name" value="{{.User.FirstName}}" placeholder="Имя">
<input class="form-control mb-2" name="last_name" value="{{.User.LastName}}" placeholder="Фамилия">
<input class="form-control mb-2" name="middle_name" value="{{.User.MiddleName}}" placeholder="Отчество">
<input class="form-control mb-2" name="position" value="{{.User.Position}}" placeholder="Должность">
<input class="form-control mb-2" name="email" value="{{.User.Email}}" placeholder="Email">
<button class="btn btn-primary">Сохранить</button>
</form>

</div>

</div>
</body>
</html>
