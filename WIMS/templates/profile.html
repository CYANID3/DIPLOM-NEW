<!DOCTYPE html>
<html>
<head>
<title>Профиль</title>

<link rel="stylesheet" href="/static/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/css/app.css">
<script src="/static/js/theme.js"></script>

</head>

<body class="bg-body">

<nav class="navbar navbar-expand-lg border-bottom px-3">
<div class="container-fluid">

<div class="navbar-nav">
<a class="nav-link" href="/">Главная</a>
<a class="nav-link" href="/history">История</a>
</div>

<div class="ms-auto d-flex gap-2">
<button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()">🌙</button>
<span>{{.Username}}</span>
</div>

</div>
</nav>

<div class="container mt-4">

<div class="card p-4">

<h3>Профиль</h3>

{{if .Message}}
<div class="alert alert-info alert-dismissible fade show">
    {{.Message}}
    <button class="btn-close" data-bs-dismiss="alert"></button>
</div>
{{end}}

<form method="post">

<h5>Данные</h5>

<input class="form-control mb-2" name="first_name" value="{{.User.FirstName}}" placeholder="Имя">
<input class="form-control mb-2" name="last_name" value="{{.User.LastName}}" placeholder="Фамилия">
<input class="form-control mb-3" name="email" value="{{.User.Email}}" placeholder="Email">

<h5>Смена пароля</h5>

<div class="input-group mb-2">
<input id="oldPass" class="form-control" type="password" name="old_password" placeholder="Текущий пароль">
<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('oldPass', this)">👁</button>
</div>

<div class="input-group mb-2">
<input id="pass1" class="form-control" type="password" name="password1" placeholder="Новый пароль">
<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('pass1', this)">👁</button>
</div>

<div class="input-group mb-3">
<input id="pass2" class="form-control" type="password" name="password2" placeholder="Повторите пароль">
<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('pass2', this)">👁</button>
</div>

<button class="btn btn-primary w-100">Сохранить</button>

</form>

</div>

</div>

<script src="/static/js/bootstrap.bundle.min.js"></script>

<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        btn.innerText = "🙈";
    } else {
        input.type = "password";
        btn.innerText = "👁";
    }
}
</script>

</body>
</html>
