<!DOCTYPE html>
<html>
<head>
<title>Админка</title>

<link rel="stylesheet" href="/static/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/css/app.css">
<script src="/static/js/theme.js"></script>

</head>

<body class="bg-body">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg border-bottom px-3">
<div class="container-fluid">

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<div class="navbar-nav">
<a class="nav-link" href="/">Главная</a>
<a class="nav-link" href="/history">История</a>
<a class="nav-link" href="/profile">Профиль</a>
</div>

<div class="ms-auto d-flex gap-2">

<button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()">🌙</button>

<div class="dropdown">
<button class="btn btn-sm btn-outline-primary dropdown-toggle" data-bs-toggle="dropdown">
{{.Username}}
</button>

<ul class="dropdown-menu dropdown-menu-end">
<li><a class="dropdown-item" href="/profile">Профиль</a></li>
<li><a class="dropdown-item text-danger" href="/logout">Выход</a></li>
</ul>
</div>

</div>

</div>
</div>
</nav>

<div class="container mt-4">

<!-- ПОИСК -->
<input id="userSearch" class="form-control mb-3" placeholder="Поиск пользователя">

<!-- СПИСОК ПОЛЬЗОВАТЕЛЕЙ -->
<div class="card p-3 mb-4">
<h5>Пользователи</h5>

<table id="usersTable" class="table table-striped">
<thead>
<tr>
<th onclick="sortUsers(0)">ФИО</th>
<th onclick="sortUsers(1)">Логин</th>
<th onclick="sortUsers(2)">Роль</th>
<th>Действия</th>
</tr>
</thead>

<tbody>
{{range .Users}}
<tr>
<td>{{.FirstName}} {{.LastName}}</td>

<td>{{.Username}}</td>

<td>
    {{if eq .Role "admin"}}
        <span class="badge text-bg-danger">admin</span>
    {{else if eq .Role "manager"}}
        <span class="badge text-bg-warning">manager</span>
    {{else}}
        <span class="badge text-bg-primary">user</span>
    {{end}}
</td>

<td>
<form action="/admin/delete" method="post">
<input type="hidden" name="username" value="{{.Username}}">
<button class="btn btn-danger btn-sm">Удалить</button>
</form>
</td>

</tr>
{{end}}
</tbody>

</table>
</div>

<!-- ДОБАВЛЕНИЕ -->
<div class="card p-3">
<h5>Добавить пользователя</h5>

<form action="/admin/create" method="post">

<div class="row">
<div class="col-md-3">
<input class="form-control mb-2" name="first_name" placeholder="Имя" required>
</div>

<div class="col-md-3">
<input class="form-control mb-2" name="last_name" placeholder="Фамилия" required>
</div>

<div class="col-md-2">
<input class="form-control mb-2" name="middle_name" placeholder="Отчество">
</div>

<div class="col-md-2">
<input class="form-control mb-2" name="position" placeholder="Должность">
</div>

<div class="col-md-2">
<select class="form-select mb-2" name="role">
<option value="user">user</option>
<option value="manager">manager</option>
<option value="admin">admin</option>
</select>
</div>
</div>

<div class="row">
<div class="col-md-4">
<input class="form-control mb-2" name="username" placeholder="Логин" required>
</div>

<div class="col-md-4">
<input class="form-control mb-2" type="password" name="password" placeholder="Пароль" required>
</div>

<div class="col-md-4">
<button class="btn btn-primary w-100">Создать</button>
</div>
</div>

</form>
</div>

</div>

<script src="/static/js/bootstrap.bundle.min.js"></script>

<script>
// ===== ПОИСК =====
const userSearch = document.getElementById("userSearch");

userSearch.addEventListener("keyup", function () {
    const filter = userSearch.value.toLowerCase();
    const rows = document.querySelectorAll("#usersTable tbody tr");

    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(filter) ? "" : "none";
    });
});

// ===== СОРТИРОВКА =====
let sortDirUsers = true;

function sortUsers(col) {
    const table = document.getElementById("usersTable");
    const rows = Array.from(table.querySelectorAll("tbody tr"));

    rows.sort((a, b) => {
        let A = a.cells[col].innerText;
        let B = b.cells[col].innerText;

        return sortDirUsers ? A.localeCompare(B) : B.localeCompare(A);
    });

    rows.forEach(row => table.querySelector("tbody").appendChild(row));
    sortDirUsers = !sortDirUsers;
}
</script>

</body>
</html>
