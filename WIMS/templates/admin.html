<!DOCTYPE html>
<html>
<head>
<title>Админка</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

<div class="mb-3">
<a class="btn btn-outline-primary btn-sm" href="/">Главная</a>
<a class="btn btn-outline-primary btn-sm" href="/history">История</a>
<a class="btn btn-outline-danger btn-sm" href="/logout">Выход</a>
</div>

<div class="card p-3 mb-3">
<h5>Пользователи</h5>

<table class="table table-striped">
<tr>
<th>ФИО</th>
<th>Логин</th>
<th>Роль</th>
<th>Действие</th>
</tr>

{{range .Users}}
<tr>
<td>{{.FirstName}} {{.LastName}}</td>
<td>{{.Username}}</td>
<td>{{.Role}}</td>
<td>
<form action="/admin/delete" method="post">
<input type="hidden" name="username" value="{{.Username}}">
<button class="btn btn-danger btn-sm">Удалить</button>
</form>
</td>
</tr>
{{end}}

</table>
</div>

<div class="card p-3">
<h5>Добавить пользователя</h5>

<form action="/admin/create" method="post">
<input class="form-control mb-2" name="first_name" placeholder="Имя">
<input class="form-control mb-2" name="last_name" placeholder="Фамилия">
<input class="form-control mb-2" name="username" placeholder="Логин">
<input class="form-control mb-2" type="password" name="password" placeholder="Пароль">

<select class="form-control mb-2" name="role">
<option value="user">user</option>
<option value="manager">manager</option>
<option value="admin">admin</option>
</select>

<button class="btn btn-primary">Добавить</button>
</form>

</div>

</div>
</body>
</html>
