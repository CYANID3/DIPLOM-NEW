<!doctype html>
<html>
  <head>
    <title>WIMS</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/static/css/app.css" />
    <script src="/static/js/theme.js"></script>
  </head>
  <body class="bg-body">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg border-bottom px-3">
      <div class="container-fluid">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <div class="navbar-nav">
            <a class="nav-link" href="/">Главная</a>
            <a class="nav-link" href="/history">История</a>
            <a class="nav-link" href="/profile">Профиль</a> {{if eq .Role
            "admin"}}
            <a class="nav-link text-danger" href="/admin">Админка</a> {{end}}
          </div>
          <div class="ms-auto d-flex gap-2">
            <button
              class="btn btn-sm btn-outline-secondary"
              onclick="toggleTheme()"
            >
              🌙
            </button>
            <div class="dropdown">
              <button
                class="btn btn-sm btn-outline-primary dropdown-toggle"
                data-bs-toggle="dropdown"
              >
                {{.Username}}
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="/profile">Профиль</a></li>
                <li>
                  <a class="dropdown-item text-danger" href="/logout">Выход</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <div class="container mt-4">
      <!-- ДОБАВИТЬ ТОВАР -->
      <div class="card p-3 mb-3">
        <h5>Добавить товар</h5>
        <form action="/add" method="post" class="row g-2">
          <input
            class="form-control"
            name="name"
            placeholder="Название"
            required
          />
          <input class="form-control" name="barcode" placeholder="Штрихкод" />
          <input
            class="form-control"
            name="price"
            type="number"
            step="0.01"
            placeholder="Цена"
            required
          />
          <input
            class="form-control"
            name="quantity"
            type="number"
            placeholder="Количество"
            required
          />
          <button class="btn btn-primary">Добавить</button>
        </form>
      </div>
      <!-- ПОИСК -->
      <input
        id="searchInput"
        class="form-control mb-3"
        placeholder="Поиск по названию или штрихкоду"
      />
      <!-- ТОВАРЫ -->
      <div class="card p-3">
        <h5>Товары</h5>
        <table id="productsTable" class="table table-striped">
          <thead>
            <tr>
              <th onclick="sortTable(0)">ID</th>
              <th onclick="sortTable(1)">Штрихкод</th>
              <th onclick="sortTable(2)">Название</th>
              <th onclick="sortTable(3)">Цена</th>
              <th onclick="sortTable(4)">Остаток</th>
              <th onclick="sortTable(5)">Сумма</th>
              <th>Продать</th>
              <th>Удалить</th>
            </tr>
          </thead>
          <tbody>
            {{range .Products}}
            <tr>
              <td>{{.ID}}</td>
              <td>{{.Barcode}}</td>
              <td>{{.Name}}</td>
              <td>{{.Price}}</td>
              <td>{{.Quantity}}</td>
              <td>{{.Total}}</td>
              <td>
                <form action="/sell" method="post" class="d-flex gap-1">
                  <input type="hidden" name="id" value="{{.ID}}" />
                  <input
                    class="form-control form-control-sm"
                    name="quantity"
                    type="number"
                    required
                  />
                  <button class="btn btn-success btn-sm">OK</button>
                </form>
              </td>
              <td>
                <form action="/delete" method="post">
                  <input type="hidden" name="id" value="{{.ID}}" />
                  <button class="btn btn-danger btn-sm">X</button>
                </form>
              </td>
            </tr>
            {{end}}
          </tbody>
        </table>
      </div>
    </div>
    <!-- JS -->
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script>
      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("keyup", function () {
        const filter = searchInput.value.toLowerCase();
        const rows = document.querySelectorAll("#productsTable tbody tr");
        rows.forEach((row) => {
          const text = row.innerText.toLowerCase();
          row.style.display = text.includes(filter) ? "" : "none";
        });
      });
      let sortDir = true;
      function sortTable(col) {
        const table = document.getElementById("productsTable");
        const rows = Array.from(table.querySelectorAll("tbody tr"));
        rows.sort((a, b) => {
          let A = a.cells[col].innerText;
          let B = b.cells[col].innerText;
          let numA = parseFloat(A);
          let numB = parseFloat(B);
          if (!isNaN(numA) && !isNaN(numB)) {
            return sortDir ? numA - numB : numB - numA;
          }
          return sortDir ? A.localeCompare(B) : B.localeCompare(A);
        });
        rows.forEach((row) => table.querySelector("tbody").appendChild(row));
        sortDir = !sortDir;
      }
    </script>
  </body>
</html>
