<!DOCTYPE html>
<html>
<head>
<title>WIMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

<h5>Вы: {{.Username}}</h5>

<div class="mb-3">
<a class="btn btn-outline-primary btn-sm" href="/">Главная</a>
<a class="btn btn-outline-primary btn-sm" href="/history">История</a>
<a class="btn btn-outline-primary btn-sm" href="/profile">Профиль</a>
<a class="btn btn-outline-danger btn-sm" href="/logout">Выход</a>
</div>

<div class="card p-3 mb-3">
<h5>Добавить товар</h5>
<form action="/add" method="post" class="row g-2">
<input class="form-control" name="name" placeholder="Название" required>
<input class="form-control" name="price" type="number" step="0.01" placeholder="Цена" required>
<input class="form-control" name="quantity" type="number" placeholder="Количество" required>
<button class="btn btn-primary">Добавить</button>
</form>
</div>

<div class="card p-3">
<h5>Товары</h5>

<table class="table table-striped">
<tr>
<th>ID</th>
<th>Название</th>
<th>Цена</th>
<th>Остаток</th>
<th>Сумма</th>
<th>Продать</th>
<th>Удалить</th>
</tr>

{{range .Products}}
<tr>
<td>{{.ID}}</td>
<td>{{.Name}}</td>
<td>{{.Price}}</td>
<td>{{.Quantity}}</td>
<td>{{.Total}}</td>
<td>
<form action="/sell" method="post" class="d-flex gap-1">
<input type="hidden" name="id" value="{{.ID}}">
<input class="form-control form-control-sm" name="quantity" type="number" required>
<button class="btn btn-success btn-sm">OK</button>
</form>
</td>
<td>
<form action="/delete" method="post">
<input type="hidden" name="id" value="{{.ID}}">
<button class="btn btn-danger btn-sm">X</button>
</form>
</td>
</tr>
{{end}}

</table>
</div>

</div>
</body>
</html>
