<!DOCTYPE html>
<html>
<head>
<title>Редактирование товара</title>
<link rel="stylesheet" href="/static/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/css/app.css">
<script src="/static/js/theme.js"></script>
</head>
<body class="bg-body">
{{template "navbar" .}}

<div class="wrapper w-100 pt-4 pb-5">
<div class="container" style="max-width:560px">

<div class="d-flex align-items-center gap-3 mb-4">
<a href="/admin/products" class="btn btn-sm btn-outline-secondary">← Назад</a>
<h4 class="fw-semibold mb-0">Редактирование товара</h4>
</div>

<form method="post">
<div class="card p-4 mb-3">
<h6 class="fw-semibold mb-3 text-muted">Основное</h6>
<div class="mb-2">
<label class="form-label small mb-1">Название</label>
<input class="form-control" name="name" value="{{.Product.Name}}" required>
</div>
<div class="mb-2">
<label class="form-label small mb-1">Штрихкод</label>
<input class="form-control" name="barcode" value="{{.Product.Barcode}}">
</div>
<div class="row g-2 mb-2">
<div class="col-md-6">
<label class="form-label small mb-1">Цена</label>
<input class="form-control" name="price" type="number" step="0.01" min="0"
       value="{{printf "%.2f" .Product.Price}}" required>
</div>
<div class="col-md-6">
<label class="form-label small mb-1">Мин. остаток</label>
<input class="form-control" name="min_stock" type="number" min="0" value="{{.Product.MinStock}}">
</div>
</div>
<div class="mb-0">
<label class="form-label small mb-1">Остаток (только чтение)</label>
<input class="form-control" value="{{.Product.Quantity}} шт." disabled>
<div class="form-text">Меняется только через операции прихода и продажи.</div>
</div>
</div>

<div class="card p-4 mb-4">
<h6 class="fw-semibold mb-3 text-muted">Категория</h6>
<select class="form-select mb-2" name="category" id="catSelect" onchange="toggleNewCat(this)">
<option value="">— без категории —</option>
{{range .Categories}}
<option value="{{.}}" {{if eq . $.Product.Category}}selected{{end}}>{{.}}</option>
{{end}}
<option value="__new__">+ Новая категория</option>
</select>
<div id="newCatWrap" style="display:none">
<label class="form-label small mb-1">Название новой категории</label>
<input class="form-control" name="category_new" id="category_new" placeholder="Введите название">
</div>
</div>

<button class="btn btn-primary w-100">Сохранить</button>
</form>

</div>
</div>

{{if .Error}}<div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="errorToast" class="toast text-bg-danger"><div class="toast-body">{{.Error}}</div></div></div>{{end}}

<script src="/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/logout.js"></script>
<script>
function toggleNewCat(sel) {
    var wrap = document.getElementById('newCatWrap');
    var inp  = document.getElementById('category_new');
    if (sel.value === '__new__') { wrap.style.display = ''; sel.value = ''; inp.required = true; }
    else { wrap.style.display = 'none'; inp.required = false; }
}
document.addEventListener('DOMContentLoaded', function () {
    var err = document.getElementById('errorToast');
    if (err) new bootstrap.Toast(err).show();
});
</script>
</body>
</html>
