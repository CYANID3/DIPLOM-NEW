<!DOCTYPE html>
<html>
<head>
<title>Регистрация</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width:400px">

<h3>Регистрация</h3>

{{if .Error}}
<div class="alert alert-danger">{{.Error}}</div>
{{end}}

<div class="card p-3">
<form method="post">
<input class="form-control mb-2" name="username" placeholder="Логин" required>
<input class="form-control mb-2" type="password" name="password" placeholder="Пароль" required>
<button class="btn btn-primary w-100">Создать</button>
</form>
</div>

<a href="/login">Войти</a>

</div>
</body>
</html>
