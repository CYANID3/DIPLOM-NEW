<!DOCTYPE html>
<html>
<head>
<title>История</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

<h5>Вы: {{.Username}}</h5>

<div class="mb-3">
<a class="btn btn-outline-primary btn-sm" href="/">Главная</a>
<a class="btn btn-outline-primary btn-sm" href="/profile">Профиль</a>
<a class="btn btn-outline-danger btn-sm" href="/logout">Выход</a>
</div>

<div class="card p-3">
<h5>История</h5>

<table class="table table-striped">
<tr>
<th>ID</th>
<th>Действие</th>
<th>Пользователь</th>
<th>Товар</th>
<th>Кол-во</th>
<th>Сумма</th>
<th>Время</th>
</tr>

{{range .History}}
<tr>
<td>{{.ID}}</td>
<td>{{.Action}}</td>
<td>{{.UserFullName}}</td>
<td>{{.Target}}</td>
<td>{{.Quantity}}</td>
<td>{{printf "%.2f" .Total}}</td>
<td>{{.Timestamp}}</td>
</tr>
{{end}}

</table>
</div>

</div>
</body>
</html>
