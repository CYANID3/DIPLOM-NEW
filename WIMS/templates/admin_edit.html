<!DOCTYPE html>
<html>
<head>
<title>Редактирование пользователя</title>

<link rel="stylesheet" href="/static/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/css/app.css">
<script src="/static/js/theme.js"></script>

</head>

<body class="bg-body">
<div class="wrapper w-100 pt-4">
<div class="container" style="max-width:700px">

<div class="card p-4">

<h3>Редактирование пользователя</h3>

<form method="post">

<h5>Данные</h5>

<input class="form-control mb-2" value="{{.User.Username}}" disabled>

<input class="form-control mb-2" name="first_name" value="{{.User.FirstName}}">
<input class="form-control mb-2" name="last_name" value="{{.User.LastName}}">
<input class="form-control mb-2" name="middle_name" value="{{.User.MiddleName}}">
<input class="form-control mb-2" name="position" value="{{.User.Position}}">
<input class="form-control mb-3" name="email" value="{{.User.Email}}">

<h5>Роль</h5>

<select class="form-select mb-3" name="role">
<option value="user" {{if eq .User.Role "user"}}selected{{end}}>user</option>
<option value="manager" {{if eq .User.Role "manager"}}selected{{end}}>manager</option>
<option value="admin" {{if eq .User.Role "admin"}}selected{{end}}>admin</option>
</select>

<h5>Смена пароля</h5>

<div class="input-group mb-2">
<input id="pass1"
       class="form-control {{if .Error}}is-invalid{{end}}"
       type="password"
       name="password1"
       placeholder="Новый пароль">
<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('pass1', this)">👁</button>
</div>

<div class="input-group mb-3">
<input id="pass2"
       class="form-control {{if .Error}}is-invalid{{end}}"
       type="password"
       name="password2"
       placeholder="Повторите пароль">
<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('pass2', this)">👁</button>
</div>

<button class="btn btn-primary w-100">Сохранить</button>

</form>

</div>

<a href="/admin" class="btn btn-secondary mt-3">Назад</a>

</div>
</div>
<!-- TOAST -->
{{if .Error}}
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="errorToast" class="toast text-bg-danger">
    <div class="toast-body">{{.Error}}</div>
  </div>
</div>
{{end}}

{{if .Success}}
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="successToast" class="toast text-bg-success">
    <div class="toast-body">{{.Success}}</div>
  </div>
</div>
{{end}}

<script src="/static/js/bootstrap.bundle.min.js"></script>

<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        btn.innerText = "🙈";
    } else {
        input.type = "password";
        btn.innerText = "👁";
    }
}

document.addEventListener("DOMContentLoaded", function () {
    const err = document.getElementById("errorToast");
    const ok = document.getElementById("successToast");

    if (err) new bootstrap.Toast(err).show();
    if (ok) new bootstrap.Toast(ok).show();
});
</script>

</body>
</html>
