<!DOCTYPE html>
<html>
<head>
<title>Вход</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
<link rel="stylesheet" href="/static/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/css/app.css">
<script src="/static/js/theme.js"></script>

</head>

<body class="bg-body">

<div class="container mt-5" style="max-width:400px">

<h3>Вход</h3>

{{if .Error}}
<div class="alert alert-danger">{{.Error}}</div>
{{end}}

<div class="card p-3">

<form method="post" autocomplete="on">

<input class="form-control mb-2" name="username" placeholder="Логин" required>

<div class="input-group mb-2">
<input id="loginPass" class="form-control" type="password" name="password" placeholder="Пароль" required>
<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('loginPass', this)">👁</button>
</div>

<button class="btn btn-primary w-100">Войти</button>

</form>

</div>

<a href="/register">Регистрация</a>

</div>

<script src="/static/js/bootstrap.bundle.min.js"></script>

<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        btn.innerText = "🙈";
    } else {
        input.type = "password";
        btn.innerText = "👁";
    }
}
</script>

</body>
</html>
